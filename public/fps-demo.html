<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>미로 1인칭 탐험 - 데모</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a14;
      color: #e0e0f0;
      font-family: 'Courier New', monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }
    #game-container {
      position: relative;
      width: 800px;
      max-width: 100vw;
    }
    #title-bar {
      text-align: center;
      padding: 8px;
      color: #7dd3fc;
      font-size: 13px;
      letter-spacing: 2px;
      text-transform: uppercase;
      border-bottom: 1px solid #1e3a5f;
      margin-bottom: 6px;
    }
    #main-view {
      position: relative;
      width: 100%;
      aspect-ratio: 16/9;
      background: #000;
      border: 1px solid #1e3a5f;
      border-radius: 4px;
      overflow: hidden;
    }
    #raycast-canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    /* 미니맵 */
    #minimap {
      position: absolute;
      top: 10px;
      right: 10px;
      border: 1px solid #334155;
      background: rgba(0,0,0,0.75);
      border-radius: 3px;
    }
    /* 조준점 */
    #crosshair {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }
    #crosshair::before, #crosshair::after {
      content: '';
      position: absolute;
      background: rgba(255,255,255,0.6);
    }
    #crosshair::before { width: 14px; height: 2px; top: 0; left: -7px; }
    #crosshair::after  { width: 2px; height: 14px; top: -7px; left: 0; }
    /* HUD 하단 */
    /* 안내 오버레이 */
    #overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.85);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      z-index: 10;
    }
    #overlay h2 { color: #7dd3fc; font-size: 22px; letter-spacing: 4px; }
    #overlay p  { color: #94a3b8; font-size: 13px; }
    #start-btn {
      margin-top: 8px;
      padding: 10px 32px;
      background: #1e3a5f;
      border: 1px solid #7dd3fc;
      color: #7dd3fc;
      font-size: 14px;
      cursor: pointer;
      border-radius: 4px;
      letter-spacing: 2px;
      transition: background 0.2s;
    }
    #start-btn:hover { background: #2563eb; }
    /* 클리어 메시지 */
    #clear-msg {
      display: none;
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.82);
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      z-index: 10;
    }
    #clear-msg h2 { color: #4ade80; font-size: 26px; letter-spacing: 3px; }
    #clear-msg p  { color: #a3e635; font-size: 14px; }
    #restart-btn {
      padding: 10px 32px;
      background: #14532d;
      border: 1px solid #4ade80;
      color: #4ade80;
      font-size: 14px;
      cursor: pointer;
      border-radius: 4px;
      letter-spacing: 2px;
    }
    #restart-btn:hover { background: #166534; }
    /* HUD 전체 */
    #hud {
      background: rgba(0,0,20,0.95);
      border: 1px solid #1e3a5f;
      border-top: none;
      border-radius: 0 0 4px 4px;
      padding: 6px 10px;
      font-size: 12px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    /* 바 영역 */
    #hud-bars {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .bar-group {
      display: flex;
      align-items: center;
      gap: 5px;
      min-width: 140px;
    }
    .bar-track {
      flex: 1;
      background: #1e293b;
      border-radius: 4px;
      height: 9px;
      min-width: 80px;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 0.3s, background 0.3s;
    }
    .bar-fill.hp  { background: #22c55e; }
    .bar-fill.mp  { background: #3b82f6; }
    .bar-label { font-size: 11px; min-width: 50px; }
    /* 정보 줄 */
    #hud-info {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      color: #9ca3af;
    }
    #hud-info b { color: #e5e7eb; }
    #hud-info .cyan b  { color: #67e8f9; }
    #hud-info .yellow b { color: #fbbf24; }
    #hud-info .purple b { color: #a78bfa; }
    /* 스탯/장비 줄 */
    #hud-stats {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      color: #9ca3af;
    }
    #hud-stats b { color: #e5e7eb; }
    .stat-badge {
      background: #1e293b;
      border: 1px solid #374151;
      border-radius: 5px;
      padding: 1px 7px;
      font-size: 11px;
      color: #d1d5db;
    }
    /* 인벤토리 버튼 */
    #inv-btn {
      margin-left: auto;
      background: #1e293b;
      border: 1px solid #6366f1;
      color: #a5b4fc;
      padding: 3px 10px;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      white-space: nowrap;
    }
    #inv-btn:hover { background: #2e3a5c; }
    /* 인벤토리 패널 */
    #inventory-panel {
      display: none;
      position: absolute;
      top: 0; right: 0;
      width: 220px;
      height: 100%;
      background: rgba(10,10,30,0.97);
      border-left: 1px solid #334155;
      z-index: 20;
      flex-direction: column;
    }
    #inventory-panel.open { display: flex; }
    #inv-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 10px;
      border-bottom: 1px solid #334155;
      color: #7dd3fc;
      font-size: 13px;
      font-weight: bold;
    }
    #inv-close {
      background: none;
      border: none;
      color: #94a3b8;
      font-size: 16px;
      cursor: pointer;
      line-height: 1;
    }
    #inv-close:hover { color: #f87171; }
    #inv-items {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .inv-item {
      background: #1e293b;
      border: 1px solid #374151;
      border-radius: 6px;
      padding: 6px 8px;
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 12px;
      color: #d1d5db;
    }
    .inv-item-emoji { font-size: 18px; flex-shrink: 0; }
    .inv-item-info  { flex: 1; display: flex; flex-direction: column; gap: 2px; min-width: 0; }
    .inv-item-name  { font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .inv-item-qty   { color: #6b7280; font-size: 10px; }
    .inv-item-spec  { color: #86efac; font-size: 10px; }
    .inv-action-btn {
      flex-shrink: 0;
      padding: 3px 7px;
      border-radius: 5px;
      font-size: 11px;
      cursor: pointer;
      border: 1px solid;
    }
    .btn-equip { background: #1e3a5f; border-color: #6366f1; color: #a5b4fc; }
    .btn-equip:hover  { background: #2e4a7f; }
    .btn-use   { background: #14532d; border-color: #4ade80; color: #86efac; }
    .btn-use:hover    { background: #166534; }
    #inv-empty {
      color: #4b5563;
      font-size: 12px;
      text-align: center;
      padding: 20px 0;
    }
    /* 알림 메시지 */
    #notif-msg {
      position: absolute;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.85);
      border: 1px solid #4a4a6e;
      color: #e8e8e8;
      padding: 8px 18px;
      border-radius: 8px;
      font-size: 13px;
      z-index: 30;
      pointer-events: none;
      transition: opacity 0.4s;
      white-space: nowrap;
    }
    /* 모바일 방향키 */
    #touch-controls {
      display: none;
      justify-content: space-between;
      align-items: center;
      padding: 8px 12px;
      gap: 12px;
    }
    #action-pad {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .action-pad-btn {
      background: rgba(30,41,59,0.95);
      border: 1px solid #4f46e5;
      color: #a5b4fc;
      font-size: 13px;
      border-radius: 8px;
      padding: 8px 12px;
      cursor: pointer;
      text-align: center;
      user-select: none;
      -webkit-user-select: none;
      touch-action: manipulation;
      white-space: nowrap;
    }
    .action-pad-btn.craft { border-color: #7c3aed; color: #c4b5fd; }
    .action-pad-btn:active { background: #1d4ed8; }
    #move-pad {
      display: grid;
      grid-template-columns: repeat(3, 52px);
      grid-template-rows: repeat(2, 52px);
      gap: 4px;
    }
    .pad-btn {
      background: rgba(30,58,92,0.9);
      border: 1px solid #334155;
      color: #7dd3fc;
      font-size: 20px;
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
      -webkit-user-select: none;
      touch-action: manipulation;
    }
    .pad-btn:active { background: #1d4ed8; }
    @media (max-width: 600px) {
      #touch-controls { display: flex; }
    }
  </style>
</head>
<body>
<div id="game-container">
  <div id="title-bar">🗺 MAZE DUNGEON — 1인칭 탐험 데모</div>

  <div id="main-view">
    <canvas id="raycast-canvas"></canvas>
    <canvas id="minimap"></canvas>
    <div id="crosshair"></div>

    <!-- 알림 메시지 -->
    <div id="notif-msg" style="opacity:0;"></div>

    <!-- 인벤토리 패널 -->
    <div id="inventory-panel">
      <div id="inv-header">
        <span>🎒 인벤토리</span>
        <button id="inv-close">✕</button>
      </div>
      <div id="inv-items"></div>
    </div>

    <div id="overlay">
      <h2>⚔ DUNGEON MAZE</h2>
      <p>1인칭 시점으로 미로를 탐험하세요</p>
      <p style="font-size:12px; color:#475569;">
        W/↑ 앞으로 &nbsp;|&nbsp; S/↓ 뒤로 &nbsp;|&nbsp; ←/A 왼쪽 회전 &nbsp;|&nbsp; →/D 오른쪽 회전
      </p>
      <button id="start-btn">탐험 시작</button>
    </div>

    <div id="clear-msg">
      <h2>🚪 출구 발견!</h2>
      <p id="clear-steps"></p>
      <button id="restart-btn">다시 탐험</button>
    </div>
  </div>

  <!-- HUD -->
  <div id="hud">
    <!-- 바 영역 -->
    <div id="hud-bars">
      <div class="bar-group">
        <span>❤️</span>
        <div class="bar-track">
          <div id="hp-bar" class="bar-fill hp" style="width:100%"></div>
        </div>
        <span class="bar-label" id="hp-text" style="color:#22c55e;">100/100</span>
      </div>
      <div class="bar-group">
        <span>💧</span>
        <div class="bar-track">
          <div id="mp-bar" class="bar-fill mp" style="width:75%"></div>
        </div>
        <span class="bar-label" id="mp-text" style="color:#3b82f6;">60/80</span>
      </div>
      <button id="inv-btn">🎒 인벤토리</button>
    </div>

    <!-- 정보 줄 -->
    <div id="hud-info">
      <span>👣 <b id="steps-info">0</b></span>
      <span>⏱ <b id="time-info">00:00</b></span>
      <span class="purple">🗺 Stage <b id="stage-info">1</b></span>
      <span class="cyan">🚪 출구: <b id="exit-info">-</b></span>
      <span class="yellow">📍 위치: <b id="pos-info">-</b></span>
      <span>🧭 거리: <b id="dist-info">-</b></span>
    </div>

    <!-- 스탯 줄 -->
    <div id="hud-stats">
      <span>⚔️ <b id="atk-info" style="color:#fca5a5;">15</b></span>
      <span>🛡️ <b id="def-info" style="color:#93c5fd;">8</b></span>
      <span class="stat-badge" id="weapon-info">⚔️ 맨손</span>
      <span class="stat-badge" id="armor-info">🛡️ 없음</span>
      <span style="color:#6b7280;">미로: <b style="color:#9ca3af;">21×21</b></span>
      <span style="color:#6b7280;">아이템: <b id="item-count" style="color:#9ca3af;">0</b>개</span>
    </div>
  </div>

  <!-- 모바일 터치 컨트롤 -->
  <div id="touch-controls">
    <!-- 왼쪽: 인벤토리 + 조합 버튼 -->
    <div id="action-pad">
      <button class="action-pad-btn" id="tc-inv-btn">🎒 인벤토리</button>
      <button class="action-pad-btn craft" id="tc-craft-btn">✨ 조합</button>
    </div>
    <!-- 오른쪽: 방향 D-pad -->
    <div id="move-pad">
      <div></div>
      <button class="pad-btn" id="btn-forward">↑</button>
      <div></div>
      <button class="pad-btn" id="btn-turnleft">←</button>
      <button class="pad-btn" id="btn-backward">↓</button>
      <button class="pad-btn" id="btn-turnright">→</button>
    </div>
  </div>
</div>

<script>
// ──────────────────────────────────────────
//  미로 생성 (재귀 역추적)
// ──────────────────────────────────────────
const MAZE_SIZE = 21; // 홀수

function generateMaze(size) {
  const maze = Array.from({ length: size }, () => Array(size).fill(0));
  function carve(x, y) {
    const dirs = [[0,-2],[0,2],[-2,0],[2,0]].sort(() => Math.random() - 0.5);
    for (const [dx, dy] of dirs) {
      const nx = x + dx, ny = y + dy;
      if (nx > 0 && nx < size-1 && ny > 0 && ny < size-1 && maze[ny][nx] === 0) {
        maze[y+dy/2][x+dx/2] = 1;
        maze[ny][nx] = 1;
        carve(nx, ny);
      }
    }
  }
  maze[1][1] = 1;
  carve(1, 1);
  maze[size-2][size-2] = 1; // 출구
  return maze;
}

// ──────────────────────────────────────────
//  게임 상태
// ──────────────────────────────────────────
let maze, W, H;
let player = { x: 1.5, y: 1.5, angle: 0, hp: 100, maxHp: 100, mp: 60, maxMp: 80 };
let targetAngle = 0;   // 90도 스냅 목표 각도
let steps = 0;
let running = false;
let animId = null;
let elapsedSeconds = 0;
let lastTimestamp = null;
const PLAYER_ATK = 15;
const PLAYER_DEF = 8;
const STAGE = 1;

const inventory = [
  { id: 'heal',   name: '회복 포션', emoji: '🧪', qty: 3, type: 'consumable', spec: 'HP +30' },
  { id: 'mana',   name: '마나 포션', emoji: '💧', qty: 2, type: 'consumable', spec: 'MP +25' },
  { id: 'eagle',  name: '독수리',   emoji: '🦅', qty: 1, type: 'consumable', spec: '1분간 미니맵 공개' },
  { id: 'sword',  name: '낡은 검',  emoji: '⚔️',  qty: 1, type: 'weapon',    spec: '공격력 +5', atk: 5 },
  { id: 'armor',  name: '가죽 갑옷',emoji: '🥋',  qty: 1, type: 'armor',     spec: '방어력 +3', def: 3 },
];
let mapRevealTimer = 0;  // 독수리 효과 남은 초
let notifTimer     = 0;
let notifMsg       = '';

const EXIT = { x: MAZE_SIZE - 1.5, y: MAZE_SIZE - 1.5 };
const MOVE_SPEED  = 0.055;
const TURN_LERP   = 0.20;   // 스냅 회전 보간 속도
const FOV         = Math.PI / 3;       // 60°
const NUM_RAYS    = 320;
const MAX_DEPTH   = MAZE_SIZE * 1.5;
const HALF_PI     = Math.PI / 2;

const keys = {};

// ──────────────────────────────────────────
//  캔버스 설정
// ──────────────────────────────────────────
const canvas  = document.getElementById('raycast-canvas');
const ctx     = canvas.getContext('2d');
const mmCanvas = document.getElementById('minimap');
const mmCtx   = mmCanvas.getContext('2d');

function resizeCanvas() {
  const view = document.getElementById('main-view');
  canvas.width  = view.clientWidth;
  canvas.height = view.clientHeight;
  W = canvas.width;
  H = canvas.height;

  const mmS = Math.min(110, view.clientWidth * 0.15);
  mmCanvas.width  = mmS;
  mmCanvas.height = mmS;
  mmCanvas.style.width  = mmS + 'px';
  mmCanvas.style.height = mmS + 'px';
}

// ──────────────────────────────────────────
//  레이캐스팅
// ──────────────────────────────────────────
function castRay(angle) {
  const cos = Math.cos(angle);
  const sin = Math.sin(angle);
  let dist = 0;
  let hit  = false;
  let side = 0; // 0=수직벽, 1=수평벽

  // DDA 알고리즘
  let rayX = player.x;
  let rayY = player.y;

  const deltaDistX = Math.abs(1 / (cos || 1e-10));
  const deltaDistY = Math.abs(1 / (sin || 1e-10));

  let mapX = Math.floor(rayX);
  let mapY = Math.floor(rayY);

  let stepX, stepY;
  let sideDistX, sideDistY;

  if (cos < 0) { stepX = -1; sideDistX = (rayX - mapX) * deltaDistX; }
  else          { stepX =  1; sideDistX = (mapX + 1 - rayX) * deltaDistX; }
  if (sin < 0) { stepY = -1; sideDistY = (rayY - mapY) * deltaDistY; }
  else          { stepY =  1; sideDistY = (mapY + 1 - rayY) * deltaDistY; }

  for (let i = 0; i < MAX_DEPTH * 10; i++) {
    if (sideDistX < sideDistY) {
      sideDistX += deltaDistX;
      mapX += stepX;
      side = 0;
    } else {
      sideDistY += deltaDistY;
      mapY += stepY;
      side = 1;
    }
    if (mapX < 0 || mapX >= MAZE_SIZE || mapY < 0 || mapY >= MAZE_SIZE) break;
    if (maze[mapY][mapX] === 0) {
      hit = true;
      dist = side === 0 ? (mapX - rayX + (1 - stepX) / 2) / cos
                        : (mapY - rayY + (1 - stepY) / 2) / sin;
      dist = Math.abs(dist);
      break;
    }
  }
  return { dist: hit ? dist : MAX_DEPTH, side };
}

// ──────────────────────────────────────────
//  렌더링
// ──────────────────────────────────────────
function drawScene() {
  // 천장 — 하늘
  const ceilGrad = ctx.createLinearGradient(0, 0, 0, H/2);
  ceilGrad.addColorStop(0,   '#0c2a6e');
  ceilGrad.addColorStop(0.5, '#1d6fa4');
  ceilGrad.addColorStop(1,   '#5ab0d8');
  ctx.fillStyle = ceilGrad;
  ctx.fillRect(0, 0, W, H/2);

  // 바닥 — 흙/잔디
  const floorGrad = ctx.createLinearGradient(0, H/2, 0, H);
  floorGrad.addColorStop(0, '#3b2a1a');
  floorGrad.addColorStop(1, '#1a1008');
  ctx.fillStyle = floorGrad;
  ctx.fillRect(0, H/2, W, H/2);

  const sliceW = W / NUM_RAYS;

  for (let i = 0; i < NUM_RAYS; i++) {
    const rayAngle = player.angle - FOV/2 + (i / NUM_RAYS) * FOV;
    const { dist, side } = castRay(rayAngle);

    // 어안렌즈 보정
    const corrected = dist * Math.cos(rayAngle - player.angle);
    const sliceH = Math.min(H, H / corrected);

    const top    = (H - sliceH) / 2;
    const bright = Math.max(0, 1 - corrected / (MAZE_SIZE * 0.8));

    // 벽 색상 — 녹색 덩굴 벽
    const base = side === 0 ? 220 : 160;
    const v    = Math.floor(base * bright);
    const r = Math.floor(v * 0.18);
    const g = Math.floor(v * 0.62);
    const b = Math.floor(v * 0.22);

    ctx.fillStyle = `rgb(${r},${g},${b})`;
    ctx.fillRect(i * sliceW, top, Math.ceil(sliceW), sliceH);

    // 바닥 반사 (얇은 그라데이션 슬라이스)
    const refAlpha = bright * 0.18;
    const refGrad = ctx.createLinearGradient(0, top + sliceH, 0, top + sliceH * 1.15);
    refGrad.addColorStop(0, `rgba(${r},${g},${b},${refAlpha})`);
    refGrad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = refGrad;
    ctx.fillRect(i * sliceW, top + sliceH, Math.ceil(sliceW), sliceH * 0.15);
  }

  // 출구 방향 화살표 (화면 가장자리)
  drawExitIndicator();
}

function drawExitIndicator() {
  const dx = EXIT.x - player.x;
  const dy = EXIT.y - player.y;
  const angleToExit = Math.atan2(dy, dx);
  let relAngle = angleToExit - player.angle;
  // -π ~ π 정규화
  while (relAngle >  Math.PI) relAngle -= 2 * Math.PI;
  while (relAngle < -Math.PI) relAngle += 2 * Math.PI;

  const dist = Math.sqrt(dx*dx + dy*dy);
  const inFOV = Math.abs(relAngle) < FOV/2;

  // HUD 갱신
  document.getElementById('dist-info').textContent = (dist * 2).toFixed(1) + ' 칸';
  document.getElementById('pos-info').textContent  = `${Math.floor(player.x)}, ${Math.floor(player.y)}`;
  document.getElementById('exit-info').textContent = `${MAZE_SIZE-2}, ${MAZE_SIZE-2}`;
  document.getElementById('steps-info').textContent = steps;
  document.getElementById('stage-info').textContent = STAGE;

  const hpPct = (player.hp / player.maxHp) * 100;
  const hpColor = hpPct > 60 ? '#22c55e' : hpPct > 30 ? '#f59e0b' : '#ef4444';
  document.getElementById('hp-bar').style.width = hpPct + '%';
  document.getElementById('hp-bar').style.background = hpColor;
  document.getElementById('hp-text').textContent = `${player.hp}/${player.maxHp}`;
  document.getElementById('hp-text').style.color = hpColor;

  const mpPct = (player.mp / player.maxMp) * 100;
  document.getElementById('mp-bar').style.width = mpPct + '%';
  document.getElementById('mp-text').textContent = `${player.mp}/${player.maxMp}`;

  // 화면 가장자리에 출구 방향 삼각형
  if (!inFOV) {
    const side = relAngle < 0 ? 'left' : 'right';
    const ex = side === 'left' ? 20 : W - 20;
    const ey = H / 2 + Math.tan(relAngle) * W * 0.4;
    const clampedEy = Math.max(30, Math.min(H - 30, ey));
    ctx.save();
    ctx.fillStyle = 'rgba(0,200,255,0.75)';
    ctx.beginPath();
    if (side === 'right') {
      ctx.moveTo(ex, clampedEy);
      ctx.lineTo(ex - 14, clampedEy - 7);
      ctx.lineTo(ex - 14, clampedEy + 7);
    } else {
      ctx.moveTo(ex, clampedEy);
      ctx.lineTo(ex + 14, clampedEy - 7);
      ctx.lineTo(ex + 14, clampedEy + 7);
    }
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  }
}

// ──────────────────────────────────────────
//  미니맵 렌더링
// ──────────────────────────────────────────
function drawMinimap() {
  const ms  = mmCanvas.width;
  const cs  = ms / MAZE_SIZE;
  mmCtx.clearRect(0, 0, ms, ms);

  const showPath = mapRevealTimer > 0;

  for (let y = 0; y < MAZE_SIZE; y++) {
    for (let x = 0; x < MAZE_SIZE; x++) {
      if (showPath) {
        mmCtx.fillStyle = maze[y][x] === 0 ? '#0d1117' : '#1e3a5f';
      } else {
        // 안개: 시작점·도착점 주변만 살짝 표시
        mmCtx.fillStyle = '#060810';
      }
      mmCtx.fillRect(x * cs, y * cs, cs, cs);
    }
  }

  // 시작점 (1,1) - 연두색
  mmCtx.fillStyle = '#4ade80';
  mmCtx.fillRect(1 * cs, 1 * cs, cs, cs);

  // 출구
  mmCtx.fillStyle = '#00ccff';
  mmCtx.fillRect((MAZE_SIZE-2) * cs, (MAZE_SIZE-2) * cs, cs, cs);

  // 플레이어
  const px = player.x * cs;
  const py = player.y * cs;
  mmCtx.fillStyle = '#facc15';
  mmCtx.beginPath();
  mmCtx.arc(px, py, cs * 1.3, 0, Math.PI * 2);
  mmCtx.fill();

  // 시야 방향선
  mmCtx.strokeStyle = 'rgba(250,204,21,0.7)';
  mmCtx.lineWidth = 1;
  mmCtx.beginPath();
  mmCtx.moveTo(px, py);
  mmCtx.lineTo(px + Math.cos(player.angle) * cs * 3, py + Math.sin(player.angle) * cs * 3);
  mmCtx.stroke();

  // 독수리 남은 시간 표시
  if (mapRevealTimer > 0) {
    mmCtx.fillStyle = 'rgba(250,204,21,0.9)';
    mmCtx.font = `${Math.max(7, Math.floor(cs * 1.8))}px monospace`;
    mmCtx.textAlign = 'center';
    mmCtx.fillText(`🦅 ${Math.ceil(mapRevealTimer)}s`, ms / 2, ms - 3);
    mmCtx.textAlign = 'left';
  }
}

// ──────────────────────────────────────────
//  충돌 감지
// ──────────────────────────────────────────
function isWall(x, y) {
  const mx = Math.floor(x);
  const my = Math.floor(y);
  if (mx < 0 || mx >= MAZE_SIZE || my < 0 || my >= MAZE_SIZE) return true;
  return maze[my][mx] === 0;
}

// ──────────────────────────────────────────
//  게임 루프
// ──────────────────────────────────────────
function formatTime(sec) {
  const m = Math.floor(sec / 60).toString().padStart(2, '0');
  const s = (sec % 60).toString().padStart(2, '0');
  return `${m}:${s}`;
}

function update(timestamp) {
  if (!running) return;

  // 타이머
  const delta = lastTimestamp !== null ? (timestamp - lastTimestamp) / 1000 : 0;
  if (lastTimestamp !== null) {
    elapsedSeconds += delta;
    if (mapRevealTimer > 0) {
      mapRevealTimer = Math.max(0, mapRevealTimer - delta);
    }
    if (notifTimer > 0) {
      notifTimer = Math.max(0, notifTimer - delta);
      const el = document.getElementById('notif-msg');
      if (el) el.style.opacity = notifTimer > 0 ? '1' : '0';
    }
  }
  lastTimestamp = timestamp;
  document.getElementById('time-info').textContent = formatTime(Math.floor(elapsedSeconds));

  const move = MOVE_SPEED;
  let moved = false;

  // 90도 스냅 회전 — 목표 각도로 부드럽게 보간
  const angleDiff = targetAngle - player.angle;
  if (Math.abs(angleDiff) > 0.005) {
    player.angle += angleDiff * TURN_LERP;
  } else {
    player.angle = targetAngle; // 오차 제거
  }

  const cos = Math.cos(player.angle);
  const sin = Math.sin(player.angle);
  const nx_fwd = player.x + cos * move;
  const ny_fwd = player.y + sin * move;
  const nx_bwd = player.x - cos * move;
  const ny_bwd = player.y - sin * move;

  if (keys['ArrowUp'] || keys['w'] || keys['W']) {
    if (!isWall(nx_fwd + cos * 0.2, player.y)) player.x = nx_fwd;
    if (!isWall(player.x, ny_fwd + sin * 0.2)) player.y = ny_fwd;
    moved = true;
  }
  if (keys['ArrowDown'] || keys['s'] || keys['S']) {
    if (!isWall(nx_bwd - cos * 0.2, player.y)) player.x = nx_bwd;
    if (!isWall(player.x, ny_bwd - sin * 0.2)) player.y = ny_bwd;
    moved = true;
  }
  // 좌우 이동 (Q/E)
  const strafeAngle = player.angle + HALF_PI;
  const sx = Math.cos(strafeAngle) * move;
  const sy = Math.sin(strafeAngle) * move;
  if (keys['q'] || keys['Q']) {
    if (!isWall(player.x - sx, player.y)) player.x -= sx;
    if (!isWall(player.x, player.y - sy)) player.y -= sy;
    moved = true;
  }
  if (keys['e'] || keys['E']) {
    if (!isWall(player.x + sx, player.y)) player.x += sx;
    if (!isWall(player.x, player.y + sy)) player.y += sy;
    moved = true;
  }

  if (moved) steps++;

  // 출구 도착 체크
  const dx = player.x - EXIT.x;
  const dy = player.y - EXIT.y;
  if (Math.sqrt(dx*dx + dy*dy) < 0.7) {
    running = false;
    const msg = document.getElementById('clear-msg');
    document.getElementById('clear-steps').textContent = `총 이동: ${steps} 스텝`;
    msg.style.display = 'flex';
    return;
  }

  drawScene();
  drawMinimap();
  animId = requestAnimationFrame(update);

}

// ──────────────────────────────────────────
//  초기화
// ──────────────────────────────────────────
function showNotif(msg) {
  notifMsg = msg;
  notifTimer = 2.5;
  const el = document.getElementById('notif-msg');
  if (el) { el.textContent = msg; el.style.opacity = '1'; }
}

function useItem(idx) {
  const item = inventory[idx];
  if (!item || item.qty <= 0) return;
  if (item.type === 'consumable') {
    if (item.id === 'heal') {
      player.hp = Math.min(player.maxHp, player.hp + 30);
      showNotif('🧪 HP +30 회복!');
    } else if (item.id === 'mana') {
      player.mp = Math.min(player.maxMp, player.mp + 25);
      showNotif('💧 MP +25 회복!');
    } else if (item.id === 'eagle') {
      mapRevealTimer = 60;
      showNotif('🦅 독수리! 1분간 미니맵 경로 공개!');
    }
    item.qty--;
    if (item.qty <= 0) inventory.splice(idx, 1);
  } else if (item.type === 'weapon') {
    showNotif(`⚔️ ${item.name} 장착! 공격력 +${item.atk}`);
  } else if (item.type === 'armor') {
    showNotif(`🛡️ ${item.name} 장착! 방어력 +${item.def}`);
  }
  renderInventory();
}

function renderInventory() {
  const container = document.getElementById('inv-items');
  const items = inventory.filter(i => i.qty > 0);
  if (items.length === 0) {
    container.innerHTML = '<div id="inv-empty">아이템 없음</div>';
    document.getElementById('item-count').textContent = 0;
    return;
  }
  container.innerHTML = inventory.map((item, idx) => {
    if (item.qty <= 0) return '';
    const isEquip = item.type === 'weapon' || item.type === 'armor';
    const btnLabel = isEquip ? '장착' : '사용';
    const btnCls   = isEquip ? 'btn-equip' : 'btn-use';
    return `
      <div class="inv-item">
        <span class="inv-item-emoji">${item.emoji}</span>
        <div class="inv-item-info">
          <span class="inv-item-name">${item.name} <span class="inv-item-qty">×${item.qty}</span></span>
          <span class="inv-item-spec">${item.spec}</span>
        </div>
        <button class="inv-action-btn ${btnCls}" onclick="useItem(${idx})">${btnLabel}</button>
      </div>
    `;
  }).join('');
  document.getElementById('item-count').textContent = inventory.reduce((s,i) => s + i.qty, 0);
}

function initGame() {
  maze = generateMaze(MAZE_SIZE);
  player = { x: 1.5, y: 1.5, angle: 0, hp: 100, maxHp: 100, mp: 60, maxMp: 80 };
  targetAngle = 0;
  steps = 0;
  elapsedSeconds = 0;
  lastTimestamp = null;
  running = true;
  if (animId) cancelAnimationFrame(animId);
  document.getElementById('clear-msg').style.display = 'none';
  document.getElementById('overlay').style.display = 'none';
  resizeCanvas();
  renderInventory();
  requestAnimationFrame(update);
}

// ──────────────────────────────────────────
//  이벤트 리스너
// ──────────────────────────────────────────
document.addEventListener('keydown', e => {
  // 방향키 스크롤 방지
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) {
    e.preventDefault();
  }
  // 회전: 90도 스냅 (한 번만 트리거)
  if (!keys[e.key]) {
    if (e.key === 'ArrowLeft'  || e.key === 'a' || e.key === 'A') {
      targetAngle -= Math.PI / 2;
    }
    if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') {
      targetAngle += Math.PI / 2;
    }
  }
  keys[e.key] = true;
});
document.addEventListener('keyup', e => { keys[e.key] = false; });

document.getElementById('start-btn').addEventListener('click', initGame);
document.getElementById('restart-btn').addEventListener('click', initGame);
window.addEventListener('resize', () => { if (running) resizeCanvas(); });

// ──────────────────────────────────────────
//  인벤토리 토글
// ──────────────────────────────────────────
document.getElementById('inv-btn').addEventListener('click', () => {
  document.getElementById('inventory-panel').classList.toggle('open');
});
document.getElementById('inv-close').addEventListener('click', () => {
  document.getElementById('inventory-panel').classList.remove('open');
});

// ──────────────────────────────────────────
//  모바일 터치 버튼
// ──────────────────────────────────────────
function bindTouchBtn(id, key) {
  const btn = document.getElementById(id);
  if (!btn) return;
  btn.addEventListener('pointerdown', () => { keys[key] = true; });
  btn.addEventListener('pointerup',   () => { keys[key] = false; });
  btn.addEventListener('pointerleave',() => { keys[key] = false; });
}
bindTouchBtn('btn-forward',  'w');
bindTouchBtn('btn-backward', 's');

// 좌우 화살표 → 90도 스냅 회전
const btnL = document.getElementById('btn-turnleft');
const btnR = document.getElementById('btn-turnright');
if (btnL) btnL.addEventListener('pointerdown', () => { targetAngle -= Math.PI / 2; });
if (btnR) btnR.addEventListener('pointerdown', () => { targetAngle += Math.PI / 2; });

// 터치 액션 버튼
const tcInv = document.getElementById('tc-inv-btn');
const tcCraft = document.getElementById('tc-craft-btn');
if (tcInv) tcInv.addEventListener('click', () => {
  document.getElementById('inventory-panel').classList.toggle('open');
});
if (tcCraft) tcCraft.addEventListener('click', () => {
  showNotif('✨ 조합 기능은 준비 중입니다.');
});

// 초기 캔버스 크기
resizeCanvas();
</script>
